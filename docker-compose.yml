services:
  memgraph:
    image: memgraph/memgraph-platform
    ports:
      - "7687:7687"
      - "3000:3000"
    volumes:
      - memgraph_data:/var/lib/memgraph

  backend:
    build: ./web/backend
    ports:
      - "8000:8000"
    environment:
      - MEMGRAPH_URI=bolt://memgraph:7687
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
    depends_on:
      - memgraph

  frontend:
    build: ./web/frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  memgraph_data:
